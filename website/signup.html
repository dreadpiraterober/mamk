<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midland City - Sign Up</title>

<style>
body {
    background-color: #f6f8fa;
    font-family: "Times New Roman", Times, serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Top Banner */
.top-full-width {
    width: 100%;
    border-bottom: 2px solid #3b71ca;
    text-align: center;
    background-color: #f7fafc;
    padding: 8px 0;
}

.top-banner {
    color: #3b629b;
    font-size: 21px;
}

/* Wrapper */
.screen-wrapper {
    width: 1000px;
    max-width: 100%; /* Responsive fix */
    background-color: #f7fafc;
    padding: 0 15px 20px 15px; /* Padding for mobile view */
    box-sizing: border-box;
    text-align: center;
}

.main-heading {
    color: #3b71ca;
    font-size: 58px;
    margin: 30px 0;
}

.form-container {
    width: 664px;
    max-width: 100%; /* Responsive fix */
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.input-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    width: 100%;
}

.field-label {
    width: 145px;
    text-align: left;
    font-size: 20px;
    color: #4c86e8;
}

.input-box {
    flex: 1;
    height: 28px;
    border: 1px solid #4c86e8;
    font-size: 18px;
    color: #4c86e8;
    padding: 0 8px;
    font-family: "Times New Roman", Times, serif;
    width: 100%;
    box-sizing: border-box;
}

.action-row {
    width: 100%;
    padding-left: 145px;
    margin-top: 10px;
    display: flex;
    justify-content: flex-start;
    box-sizing: border-box;
}

.submit-button {
    background-color: #df9544;
    color: white;
    border: 1px solid #cb8233;
    font-family: "Times New Roman", Times, serif;
    font-size: 21px;
    padding: 4px 28px;
    border-radius: 3px;
    cursor: pointer;
}

/* --- Responsive Media Query --- */
@media (max-width: 768px) {
    .main-heading {
        font-size: 40px;
        margin: 20px 0 15px 0;
    }
    
    .input-row {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 15px;
    }
    
    .field-label {
        width: 100%;
        margin-bottom: 5px;
    }
    
    .action-row {
        padding-left: 0;
        justify-content: center;
    }
    
    .submit-button {
        width: 100%;
        padding: 8px 0;
    }
}
</style>
</head>
<body>

<div class="top-full-width">
    <div class="top-banner">Midland City</div>
</div>

<div class="screen-wrapper">

    <h1 class="main-heading">Create Account</h1>

    <form class="form-container" method="POST" action="signup.php">

        <div class="input-row">
            <div class="field-label">Username:</div>
            <input class="input-box" name="username" required>
        </div>

        <div class="input-row">
            <div class="field-label">Password:</div>
            <input class="input-box" name="password" type="password" required>
        </div>

        <div class="action-row">
            <button class="submit-button" type="submit">
                Sign Up
            </button>
        </div>

    </form>

</div>

</body>
</html>
